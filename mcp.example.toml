# Copy this file to ~/.nanocodex/mcp.toml and edit for your machine.
# MCP servers run outside the nanocodex sandbox. Only enable servers you trust.

[mcp_servers.fetch]
command = "uvx"
args = ["mcp-server-fetch"]

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "D:\\agent_prac"]

